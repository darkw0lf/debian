# Configuration nginx TLS 1.3 sécurisée
server {
    listen 443 ssl http2;
    server_name www.exemple.com;

    # Certificat et clé privée
    ssl_certificate     /etc/ssl/certs/exemple.crt;
    ssl_certificate_key /etc/ssl/private/exemple.key;

    # Versions TLS : 1.2 minimum, 1.3 activé
    ssl_protocols TLSv1.2 TLSv1.3;

    # Suites cipher sécurisées (TLS 1.2)
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;  # Laisser TLS 1.3 choisir

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;

    # HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload";

    # Session tickets (désactivés pour PFS strict)
    ssl_session_tickets off;
}
